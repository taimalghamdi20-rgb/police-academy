<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trust State | Academy</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
  font-family:'Cairo',sans-serif;
  background:#020617;
  color:white;
  margin:0;
}

/* 🔥 البنر الجديد */
.main-banner{
  width:100%;
  height:260px;
  background:url('PUT-IMAGE-HERE') center/cover no-repeat;
  position:relative;
}

.main-banner::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(0,0,0,0.8));
}

/* الهيدر */
.top-banner{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 40px;
  background:#0f141b;
  border-bottom:1px solid #1f2937;
}

.banner-text h1{
  font-size:22px;
  margin:0;
}

.banner-text span{
  font-size:12px;
  color:#9ca3af;
}

/* اللوقو */
.logo{
  width:60px;
  height:60px;
  border-radius:50%;
  border:2px solid rgba(255,255,255,0.2);
  overflow:hidden;
}

.logo img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* الناف */
nav{
  display:flex;
  justify-content:center;
  gap:15px;
  padding:15px;
  background:#0f141b;
}

nav button{
  padding:10px;
  background:#111827;
  border:1px solid #1f2937;
  color:#d1d5db;
  border-radius:6px;
  cursor:pointer;
}

/* باقي كودك بدون تغيير */
section{display:none;padding:30px}
.active{display:block}

.container{
  max-width:900px;
  margin:auto;
  background:#0f141b;
  padding:25px;
  border-radius:10px;
}

input,textarea,select{
  width:100%;
  margin-top:10px;
  padding:12px;
  background:#020617;
  color:white;
  border:1px solid #1f2937;
}

button.submit{
  margin-top:15px;
  padding:12px;
  width:100%;
  background:#1e40af;
  border:none;
}

.card{
  padding:15px;
  margin-top:10px;
  border-radius:6px;
  background:#020617;
  border-left:5px solid #facc15;
}
.card.accepted{border-left-color:#22c55e}
.card.rejected{border-left-color:#ef4444}

.card button{margin-top:10px;margin-left:5px}
.accept{background:#22c55e}
.reject{background:#ef4444}
.delete{background:#6b7280}

.alert{position:fixed;top:20px;right:20px;padding:10px;border-radius:6px}
.success{background:#22c55e}
.error{background:#ef4444}

</style>
</head>

<body>

<!-- 🔥 البنر -->
<div class="main-banner"></div>

<!-- الهيدر -->
<div class="top-banner">
  <div class="banner-text">
    <h1>Trust State | Ministry of Interior - Academy</h1>
    <span>Official Police System</span>
  </div>

  <div class="logo">
    <img src="PUT-LOGO-HERE">
  </div>
</div>

<nav>
<button onclick="showPage('home')">الرئيسية</button>
<button onclick="showPage('apply')">التقديم</button>
<button onclick="showPage('admin')">الإدارة</button>
</nav>

<section id="home" class="active">
<div class="container">مرحبا بك في أكاديمية شرطة Trust State</div>
</section>

<section id="apply">
<div class="container">
<select id="status" disabled>
<option>⏳ انتظار</option>
<option>✅ مقبول</option>
<option>❌ مرفوض</option>
</select>
<input id="nameEl" placeholder="الاسم">
<input id="ageEl" placeholder="العمر">
<input id="discordEl" placeholder="Discord ID">
<textarea id="expEl" placeholder="الخبرات"></textarea>
<textarea id="reasonEl" placeholder="السبب"></textarea>
<button class="submit" onclick="submitForm()">إرسال</button>
</div>
</section>

<section id="admin">
<div class="container">
<input id="adminPass" placeholder="كلمة المرور" type="password">
<button onclick="checkAdminPassword()">دخول</button>
<div class="search-box">
<input id="search" placeholder="بحث بالاسم" oninput="searchRequests()">
</div>
<div id="requests"></div>
</div>
</section>

</body>
</html>
