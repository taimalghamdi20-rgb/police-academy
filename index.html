<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trust | Police Academy</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin:0; padding:0; }

body {
  font-family: 'Cairo', sans-serif;
  background: linear-gradient(135deg,#020617,#1e293b,#020617);
  color: white;
}

/* Header احترافي */
header {
  padding: 25px;
  text-align: center;
  font-size: 32px;
  font-weight: bold;
  background: linear-gradient(135deg,#22c55e,#16a34a);
  letter-spacing: 1px;
}

/* NAV */
nav {
  display:flex;
  justify-content:center;
  gap:20px;
  padding:15px;
}

nav button {
  padding:10px 20px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:#1e293b;
  color:white;
  transition:0.2s;
}

/* Hover */
nav button:hover,
button.submit:hover {
  transform: scale(1.05);
  background: linear-gradient(135deg,#4ade80,#22c55e);
}

/* Sections */
section { display:none; padding:30px; }
.active { display:block; }

/* Container */
.container {
  max-width:800px;
  margin:auto;
  background:rgba(255,255,255,0.05);
  padding:30px;
  border-radius:16px;
  box-shadow:0 10px 25px rgba(0,0,0,0.4);
  animation:fadeIn 0.5s ease;
}

@keyframes fadeIn {
  from {opacity:0; transform:translateY(20px);}
  to {opacity:1; transform:translateY(0);}
}

/* الفورم */
input, textarea, select {
  width:100%;
  margin-top:15px;
  padding:15px;
  border-radius:12px;
  border:none;
  background:rgba(255,255,255,0.1);
  color:white;
}

input:focus, textarea:focus {
  outline:none;
  border:1px solid #22c55e;
  background:rgba(255,255,255,0.15);
}

textarea { height:100px; }

button.submit {
  margin-top:20px;
  padding:15px;
  width:100%;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-weight:bold;
  background: linear-gradient(135deg,#22c55e,#16a34a);
}

/* Cards */
.card {
  padding:20px;
  border-radius:12px;
  margin-top:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

/* Buttons */
.accept { background:#16a34a; color:white; }
.reject { background:#dc2626; color:white; }

/* Toast */
.toast {
  position:fixed;
  top:20px;
  right:20px;
  background:#22c55e;
  padding:15px;
  border-radius:10px;
  display:none;
}

/* Search */
#search {
  margin-top:10px;
  margin-bottom:15px;
}
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, push, onValue, update } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAto5x8fpwvUmfnumsUekXLpyo3KGBsMt4",
  authDomain: "trust-police-academy.firebaseapp.com",
  databaseURL: "https://trust-police-academy-default-rtdb.firebaseio.com",
  projectId: "trust-police-academy",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let requestNumber = 1;

/* Toast */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.innerText = msg;
  t.style.display = "block";
  setTimeout(()=> t.style.display="none",3000);
}

/* إرسال */
window.submitForm = function() {
  const name = document.getElementById('name').value.trim();
  const age = document.getElementById('age').value.trim();
  const discordId = document.getElementById('discordId').value.trim();
  const exp = document.getElementById('exp').value.trim();
  const reason = document.getElementById('reason').value.trim();
  const msg = document.getElementById('formMessage');

  if(!name || !age || !discordId || !exp || !reason){
    msg.innerText="❌ يرجى تعبئة جميع الحقول";
    return;
  }

  msg.innerText="⏳ جاري الإرسال...";

  push(ref(db,'طلبات'), {
    name, age, discordId, exp, reason,
    status:'pending',
    timestamp: Date.now(),
    number: requestNumber++
  }).then(()=>{
    msg.innerText="✅ تم إرسال الطلب";
    showToast("تم إرسال الطلب بنجاح 🎉");
  });
}

/* تحميل الطلبات */
window.loadRequests = function() {
  const container = document.getElementById('requests');

  onValue(ref(db,'طلبات'), snap=>{
    container.innerHTML='';
    snap.forEach(child=>{
      const r = child.val();

      let bg = r.status=='accepted' ? 'rgba(34,197,94,0.2)'
              : r.status=='rejected' ? 'rgba(220,38,38,0.2)'
              : 'rgba(250,204,21,0.2)';

      const div=document.createElement('div');
      div.className='card';
      div.style.background=bg;

      div.innerHTML=`
      🧾 رقم الطلب: ${r.number}<br>
      👤 ${r.name}<br>
      🆔 ${r.discordId}<br>
      ⏱ ${new Date(r.timestamp).toLocaleString()}<br>
      الحالة: ${r.status}<br>
      <button class="accept" onclick="updateStatus('${child.key}','accepted')">قبول</button>
      <button class="reject" onclick="updateStatus('${child.key}','rejected')">رفض</button>
      `;

      container.appendChild(div);
    });
  });
}

/* تحديث الحالة */
window.updateStatus = function(id,status){
  update(ref(db,'طلبات/'+id),{status});
  showToast("تم تحديث الحالة 🔔");
}

/* البحث */
window.searchRequests = function(){
  const val=document.getElementById('search').value.toLowerCase();
  document.querySelectorAll('.card').forEach(c=>{
    c.style.display=c.innerText.toLowerCase().includes(val)?'block':'none';
  });
}
</script>
</head>

<body>

<header>🚔 Trust Police Academy</header>

<nav>
<button onclick="showPage('home')">الرئيسية</button>
<button onclick="showPage('apply')">التقديم</button>
<button onclick="showPage('admin'); loadRequests()">الإدارة</button>
</nav>

<section id="home" class="active">
<div class="container">
<h2>مرحبا بك في الأكاديمية</h2>
<p>نظام تقديم احترافي</p>
</div>
</section>

<section id="apply">
<div class="container">
<h2>📋 نموذج التقديم</h2>

<input id="name" placeholder="الاسم">
<input id="age" placeholder="العمر">
<input id="discordId" placeholder="Discord ID">
<textarea id="exp" placeholder="الخبرة"></textarea>
<textarea id="reason" placeholder="سبب التقديم"></textarea>

<button class="submit" onclick="submitForm()">إرسال</button>
<div id="formMessage"></div>
</div>
</section>

<section id="admin">
<div class="container">
<h2>🛡️ لوحة الإدارة</h2>

<input id="search" placeholder="🔍 بحث بالاسم..." onkeyup="searchRequests()">

<div id="requests"></div>
</div>
</section>

<div id="toast" class="toast"></div>

<script>
function showPage(id){
  document.querySelectorAll('section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
</script>

</body>
</html>
