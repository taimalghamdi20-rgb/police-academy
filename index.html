<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trust | Police Academy</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin:0; padding:0; }

/* 🔥 خلفية احترافية */
body {
  font-family: 'Cairo', sans-serif;
  background: linear-gradient(135deg,#020617,#0f172a,#020617),
              url('https://images.unsplash.com/photo-1549921296-3a6b9d5e0c5a') no-repeat center/cover;
  background-blend-mode: overlay;
  color: white;
}

/* 🔥 الهيدر */
header {
  padding: 25px;
  text-align: center;
  font-size: 32px;
  font-weight: bold;
  background: rgba(0,0,0,0.6);
  border-bottom: 2px solid gold;
}

/* 🔥 الناف بار */
nav { display:flex; justify-content:center; gap:20px; padding:15px; }

nav button {
  padding:10px 20px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:#1e293b;
  color:white;
  transition: 0.3s;
}

nav button:hover {
  background: gold;
  color: black;
  transform: scale(1.05);
}

/* الصفحات */
section { display:none; padding:30px; }
.active { display:block; }

.container {
  max-width:800px;
  margin:auto;
  background:rgba(0,0,0,0.6);
  padding:30px;
  border-radius:16px;
  backdrop-filter: blur(10px);
}

/* 🔥 الحقول */
input, textarea, select {
    width: 100%;
    margin-top: 15px;
    padding: 15px;
    border: none;
    border-radius: 12px;
    background: rgba(255,255,255,0.1);
    color: white;
    font-size: 16px;
    transition: 0.3s;
}

input:focus, textarea:focus {
    outline: none;
    background: rgba(255,255,255,0.2);
}

textarea { height: 100px; }

/* 🔥 زر الإرسال */
button.submit {
    margin-top: 20px;
    padding: 15px;
    width: 100%;
    background: linear-gradient(135deg,gold,#facc15);
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-size: 16px;
    font-weight: bold;
    color:black;
    transition: 0.3s;
}

button.submit:hover {
    transform: scale(1.05);
}

/* 🔥 الكروت */
.card {
    background: rgba(255,255,255,0.05);
    padding: 20px;
    border-radius: 12px;
    margin-top: 15px;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
    background: rgba(255,255,255,0.1);
}

.card button {
    margin-left:10px;
    padding:6px 12px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
}

.card button.accept { background:#16a34a; color:white; }
.card button.reject { background:#dc2626; color:white; }

.card button:hover {
  transform: scale(1.1);
}

/* الحالة */
.status.pending { color:yellow; }
.status.accepted { color:#22c55e; }
.status.rejected { color:#dc2626; }

.message-box {
  margin-top:15px;
  padding:12px;
  border-radius:10px;
  background:rgba(255,255,255,0.1);
  font-weight:bold;
  text-align:center;
}

ul { margin-top:10px; padding-left:20px; }
</style>
