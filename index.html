<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trust State | Academy</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
/* ... الأكواد الأخرى ... */

<div class="main-image">
  <img src="https://chatgpt.com/backend-api/estuary/content?id=file_000000005ee471f5b55d31c293712ac7&ts=493164&p=fs&cid=1&sig=b38574582738577900d312b2defd5ea796b290ec4698aed5b8feda792f8cd103&v=0">
</div>
}

/* تظليل خفيف لإبراز النص */
.top-banner::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.6));
}

.banner-text{ position:relative; z-index:1; }
.banner-text h1{
  font-size:26px;
  font-weight:700;
  color:#e5e7eb;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
}

.banner-text span{
  font-size:13px;
  color:#9ca3af;
}

/* لوقو يمين */
.logo{
  position:relative;
  z-index:1;
  width:60px;
  height:60px;
  border-radius:50%;
  border:2px solid rgba(255,255,255,0.2);
  display:flex;
  align-items:center;
  justify-content:center;
  backdrop-filter:blur(5px);
}

nav{
  display:flex;
  justify-content:center;
  gap:15px;
  padding:15px;
  background:#0f141b;
  border-bottom:1px solid #1f2937;
}

nav button{
  padding:10px 15px;
  background:#111827;
  border:1px solid #1f2937;
  color:#d1d5db;
  border-radius:6px;
  cursor:pointer;
  transition:.3s;
}

nav button:hover{
  background:#1f2937;
  color:white;
}

section{display:none;padding:30px}
.active{display:block}

.container{
  max-width:900px;
  margin:auto;
  background:#0f141b;
  padding:25px;
  border-radius:10px;
  border:1px solid #1f2937;
}

input,textarea,select{
  width:100%;
  margin-top:10px;
  padding:12px;
  border-radius:6px;
  border:1px solid #1f2937;
  background:#020617;
  color:white;
}

button.submit{
  margin-top:15px;
  padding:12px;
  width:100%;
  background:#1e40af;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.card{
  padding:15px;
  margin-top:10px;
  border-radius:6px;
  background:#020617;
  border-left:5px solid #facc15;
}
.card.accepted{border-left-color:#22c55e}
.card.rejected{border-left-color:#ef4444}

.card button{margin-top:10px;margin-left:5px;padding:6px 12px;border:none;border-radius:5px;cursor:pointer}
.accept{background:#22c55e}
.reject{background:#ef4444}
.delete{background:#6b7280}

.search-box{display:flex;gap:10px;margin-top:10px}

.alert{position:fixed;top:20px;right:20px;padding:10px;border-radius:6px}
.success{background:#22c55e}
.error{background:#ef4444}
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

const firebaseConfig={apiKey:"AIzaSyAto5x8fpwvUmfnumsUekXLpyo3KGBsMt4",authDomain:"trust-police-academy.firebaseapp.com",databaseURL:"https://trust-police-academy-default-rtdb.firebaseio.com",projectId:"trust-police-academy"};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

let isAdmin=false;
let allRequests=[];
let currentKey=null;

window.showPage=function(p){
 document.querySelectorAll('section').forEach(s=>s.classList.remove('active'));
 document.getElementById(p).classList.add('active');
 if(p==='admin'&&isAdmin)loadRequests();
}

function alertBox(m,t){
 const d=document.createElement('div');
 d.className='alert '+t;
 d.innerText=m;
 document.body.appendChild(d);
 setTimeout(()=>d.remove(),3000);
}

window.checkAdminPassword=function(){
 const p=document.getElementById('adminPass').value;
 if(p==='Police2026!'){isAdmin=true;alertBox('تم الدخول','success');loadRequests();}
 else alertBox('خطأ','error');
}

window.submitForm=function(){
 const name=nameEl.value.trim();
 const age=ageEl.value.trim();
 const discordId=discordEl.value.trim();
 const exp=expEl.value.trim();
 const reason=reasonEl.value.trim();

 if(!name||!age||!discordId||!exp||!reason){alertBox('اكمل الحقول','error');return;}

 push(ref(db,'طلبات'),{name,age,discordId,exp,reason,status:'pending',time:Date.now()})
 .then(snap=>{currentKey=snap.key;watchStatus();alertBox('تم الإرسال','success');});
}

function watchStatus(){
 if(!currentKey)return;
 onValue(ref(db,'طلبات/'+currentKey),snap=>{
  const r=snap.val();
  const s=document.getElementById('status');
  if(!s)return;
  if(r.status==='accepted')s.value='✅ مقبول';
  else if(r.status==='rejected')s.value='❌ مرفوض';
  else s.value='⏳ انتظار';
 });
}

window.acceptRequest=id=>update(ref(db,'طلبات/'+id),{status:'accepted'});
window.rejectRequest=id=>update(ref(db,'طلبات/'+id),{status:'rejected'});
window.deleteRequest=id=>remove(ref(db,'طلبات/'+id));

function loadRequests(){
 onValue(ref(db,'طلبات'),snap=>{
  allRequests=[];
  snap.forEach(c=>allRequests.push({r:c.val(),key:c.key}));
  renderRequests();
 });
}

window.searchRequests=renderRequests;

function renderRequests(){
 const box=document.getElementById('requests');
 const search=document.getElementById('search').value.toLowerCase();
 box.innerHTML='';

 allRequests.forEach(({r,key})=>{
  if(search && !r.name.toLowerCase().includes(search)) return;

  const date=new Date(r.time).toLocaleString('ar-SA');
  let cls='pending',txt='⏳ انتظار';
  if(r.status==='accepted'){cls='accepted';txt='✅ مقبول'}
  if(r.status==='rejected'){cls='rejected';txt='❌ مرفوض'}

  const div=document.createElement('div');
  div.className='card '+cls;
  div.innerHTML=`
  <b>الاسم:</b> ${r.name}<br>
  <b>العمر:</b> ${r.age}<br>
  <b>ID:</b> ${r.discordId}<br>
  <b>الخبرات:</b> ${r.exp}<br>
  <b>السبب:</b> ${r.reason}<br>
  <b>التاريخ:</b> ${date}<br>
  <b>${txt}</b><br>
  <button class='accept' onclick="acceptRequest('${key}')">قبول</button>
  <button class='reject' onclick="rejectRequest('${key}')">رفض</button>
  <button class='delete' onclick="deleteRequest('${key}')">حذف</button>`;

  box.appendChild(div);
 });
}
</script>
</head>
<body>

<div class="top-banner">
  <div class="banner-text">
    <h1>Trust State | Ministry of Interior - Academy</h1>
    <span>Official Police System</span>
  </div>
  <div class="logo">
  <img src="a_digital_logo_logo_design_for_a_police_academy.png" style="width:60px;height:60px;border-radius:50%;object-fit:cover;" />
</div>
</div>

<nav>
<button onclick="showPage('home')">الرئيسية</button>
<button onclick="showPage('apply')">التقديم</button>
<button onclick="showPage('admin')">الإدارة</button>
</nav>

<section id="home" class="active"><div class="container">مرحبا بك في أكاديمية شرطة Trust State</div></section>

<section id="apply"><div class="container">
<select id="status" disabled>
<option>⏳ انتظار</option>
<option>✅ مقبول</option>
<option>❌ مرفوض</option>
</select>
<input id="nameEl" placeholder="الاسم">
<input id="ageEl" placeholder="العمر">
<input id="discordEl" placeholder="Discord ID">
<textarea id="expEl" placeholder="الخبرات"></textarea>
<textarea id="reasonEl" placeholder="السبب"></textarea>
<button class="submit" onclick="submitForm()">إرسال</button>
</div></section>

<section id="admin"><div class="container">
<input id="adminPass" placeholder="كلمة المرور" type="password">
<button onclick="checkAdminPassword()">دخول</button>
<div class="search-box">
<input id="search" placeholder="بحث بالاسم" oninput="searchRequests()">
</div>
<div id="requests"></div>
</div></section>

</body>
</html>
