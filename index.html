<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LSPD | Police Academy</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Cairo',sans-serif;background:#020617;color:white}

header{padding:25px;text-align:center;font-size:30px;font-weight:bold;background:#020617;border-bottom:2px solid #1e40af}

nav{display:flex;justify-content:center;gap:15px;padding:15px}
nav button{padding:10px 15px;border:none;border-radius:6px;background:#020617;color:#cbd5f5;border:1px solid #1e40af;cursor:pointer;transition:.3s}
nav button:hover{background:#1e40af;color:#fff;box-shadow:0 0 10px #1e40af}

section{display:none;padding:30px}
.active{display:block;animation:fade .4s}
@keyframes fade{from{opacity:0}to{opacity:1}}

.container{max-width:850px;margin:auto;background:#020617;padding:25px;border-radius:10px;border:1px solid #1e40af}

input,textarea,select{width:100%;margin-top:10px;padding:12px;border-radius:6px;border:1px solid #1e40af;background:#020617;color:white}
input:focus,textarea:focus{outline:none;box-shadow:0 0 10px #3b82f6}

button.submit{margin-top:15px;padding:12px;width:100%;background:#1e40af;border:none;border-radius:6px;cursor:pointer}
button.submit:hover{background:#2563eb}

.card{padding:15px;margin-top:10px;border-radius:6px;background:#020617;border-left:5px solid #facc15}
.card.accepted{border-left-color:#16a34a;background:rgba(22,163,74,0.15)}
.card.rejected{border-left-color:#dc2626;background:rgba(220,38,38,0.15)}

.card button{margin-top:10px;margin-left:5px;padding:6px 12px;border:none;border-radius:5px;cursor:pointer}
.card .accept{background:#16a34a;color:white}
.card .reject{background:#dc2626;color:white}

.status{font-weight:bold}
.pending{color:#facc15}
.acceptedText{color:#16a34a}
.rejectedText{color:#dc2626}

.alert{position:fixed;top:20px;right:20px;padding:10px 15px;border-radius:6px;font-weight:bold;animation:slide .4s}
.success{background:#16a34a}
.error{background:#dc2626}
@keyframes slide{from{transform:translateX(100%)}to{transform:translateX(0)}}
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, push, onValue, update } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

const firebaseConfig={
 apiKey:"AIzaSyAto5x8fpwvUmfnumsUekXLpyo3KGBsMt4",
 authDomain:"trust-police-academy.firebaseapp.com",
 databaseURL:"https://trust-police-academy-default-rtdb.firebaseio.com",
 projectId:"trust-police-academy"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

let isAdmin=false;
let currentKey=null;

window.showPage=function(page){
 document.querySelectorAll('section').forEach(s=>s.classList.remove('active'));
 document.getElementById(page).classList.add('active');
 if(page==='admin'&&isAdmin)loadRequests();
}

function alertBox(msg,type){
 const div=document.createElement('div');
 div.className='alert '+type;
 div.innerText=msg;
 document.body.appendChild(div);
 setTimeout(()=>div.remove(),3000);
}

window.checkAdminPassword=function(){
 const pass=document.getElementById('adminPass').value;
 if(pass==='Police2026!'){
  isAdmin=true;
  alertBox('تم تسجيل الدخول','success');
  loadRequests();
 }else alertBox('كلمة المرور غلط','error');
}

window.submitForm=function(){
 const name=document.getElementById('name').value.trim();
 const age=document.getElementById('age').value.trim();
 const discordId=document.getElementById('discordId').value.trim();
 const exp=document.getElementById('exp').value.trim();
 const reason=document.getElementById('reason').value.trim();

 if(!name||!age||!discordId||!exp||!reason){
  alertBox('اكمل كل الحقول','error');
  return;
 }

 push(ref(db,'طلبات'),{name,age,discordId,exp,reason,status:'pending',time:Date.now()})
 .then(snap=>{
  currentKey=snap.key;
  alertBox('تم الإرسال','success');
  watchStatus();
 });
}

function watchStatus(){
 if(!currentKey)return;
 onValue(ref(db,'طلبات/'+currentKey),snap=>{
  const r=snap.val();
  const select=document.getElementById('status');
  if(r.status==='accepted')select.value='✅ مقبول';
  else if(r.status==='rejected')select.value='❌ مرفوض';
  else select.value='⏳ انتظار';
 });
}

window.acceptRequest=id=>update(ref(db,'طلبات/'+id),{status:'accepted'});
window.rejectRequest=id=>update(ref(db,'طلبات/'+id),{status:'rejected'});

function loadRequests(){
 const box=document.getElementById('requests');
 box.innerHTML='';
 onValue(ref(db,'طلبات'),snap=>{
  box.innerHTML='';
  snap.forEach(child=>{
   const r=child.val();
   const key=child.key;

   const date=new Date(r.time||Date.now());
   const formatted=date.toLocaleString('ar-SA');

   let statusClass='pending';
   let statusText='⏳ انتظار';
   if(r.status==='accepted'){statusClass='accepted';statusText='✅ مقبول';}
   if(r.status==='rejected'){statusClass='rejected';statusText='❌ مرفوض';}

   const div=document.createElement('div');
   div.className='card '+statusClass;
   div.innerHTML=`
   <b>الاسم:</b> ${r.name}<br>
   <b>العمر:</b> ${r.age}<br>
   <b>ID:</b> ${r.discordId}<br>
   <b>الخبرات:</b> ${r.exp}<br>
   <b>السبب:</b> ${r.reason}<br>
   <b>التاريخ:</b> ${formatted}<br>
   <b class="status ${statusClass==='accepted'?'acceptedText':statusClass==='rejected'?'rejectedText':'pending'}">${statusText}</b><br>
   <button class="accept" onclick="acceptRequest('${key}')">قبول</button>
   <button class="reject" onclick="rejectRequest('${key}')">رفض</button>`;

   box.appendChild(div);
  });
 });
}
</script>
</head>
<body>

<header>LSPD | ACADEMY</header>

<nav>
<button onclick="showPage('home')">الرئيسية</button>
<button onclick="showPage('apply')">التقديم</button>
<button onclick="showPage('admin')">الإدارة</button>
</nav>

<section id="home" class="active">
<div class="container">
<h2>Los Santos Police Department</h2>
<p>نظام التقديم الرسمي</p>
</div>
</section>

<section id="apply">
<div class="container">
<h2>التقديم</h2>
<select id="status" disabled>
<option>⏳ انتظار</option>
<option>✅ مقبول</option>
<option>❌ مرفوض</option>
</select>
<input id="name" placeholder="الاسم">
<input id="age" type="number" placeholder="العمر">
<input id="discordId" placeholder="Discord ID">
<textarea id="exp" placeholder="الخبرات"></textarea>
<textarea id="reason" placeholder="سبب التقديم"></textarea>
<button class="submit" onclick="submitForm()">إرسال</button>
</div>
</section>

<section id="admin">
<div class="container">
<h2>لوحة الإدارة</h2>
<input type="password" id="adminPass" placeholder="كلمة المرور">
<button onclick="checkAdminPassword()">دخول</button>
<div id="requests"></div>
</div>
</section>

</body>
</html>
