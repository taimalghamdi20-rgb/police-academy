<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trust | Police Academy</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin:0; padding:0; }
body {
  font-family: 'Cairo', sans-serif;
  background: linear-gradient(135deg,#020617,#0f172a,#020617);
  color: white;
}

header {
  padding: 25px;
  text-align: center;
  font-size: 32px;
  font-weight: bold;
  background: rgba(255,255,255,0.05);
  border-bottom: 1px solid rgba(255,255,255,0.1);
}

nav {
  display:flex;
  justify-content:center;
  gap:20px;
  padding:15px;
}
nav button {
  padding:10px 20px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:#1e293b;
  color:white;
}

section { display:none; padding:30px; }
.active { display:block; }

.container {
  max-width:800px;
  margin:auto;
  background:rgba(255,255,255,0.05);
  padding:30px;
  border-radius:16px;
}

input, textarea {
  width:100%;
  margin-top:10px;
  padding:15px;
  border:none;
  border-radius:10px;
  background:rgba(255,255,255,0.1);
  color:white;
  font-size:16px;
}

button.submit {
  margin-top:20px;
  padding:15px;
  width:100%;
  background:linear-gradient(135deg,#22c55e,#16a34a);
  border:none;
  border-radius:12px;
  cursor:pointer;
}

.card {
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:12px;
  margin-top:15px;
}
</style>
</head>
<body>

<header>Trust | Police Academy</header>

<nav>
  <button onclick="showPage('home')">الرئيسية</button>
  <button onclick="showPage('apply')">التقديم</button>
  <button onclick="showPage('admin')">الإدارة</button>
</nav>

<section id="home" class="active">
  <div class="container">
    <h2>مرحبا بك في الأكاديمية</h2>
    <p>نظام تقديم احترافي للانضمام إلى الشرطة</p>
  </div>
</section>

<section id="apply">
  <div class="container">
    <h2>نموذج التقديم</h2>

    <input id="name" placeholder="الاسم الكامل">
    <input id="age" type="number" placeholder="العمر">
    <textarea id="exp" placeholder="الخبرات"></textarea>
    <textarea id="reason" placeholder="سبب التقديم"></textarea>

    <button class="submit" onclick="submitForm()">إرسال</button>
  </div>
</section>

<section id="admin">
  <div class="container">
    <h2>لوحة الإدارة</h2>
    <div id="requests"></div>
  </div>
</section>

<script>
let isAdmin = false; // افتراضياً الشخص مو أدمن

function showPage(page) {
  if(page === 'admin' && !isAdmin) {
    let pass = prompt("أدخل كلمة المرور للوصول للإدارة:");
    if(pass === "Police2026!") { // كلمة المرور الجديدة
      isAdmin = true;
    } else {
      alert("كلمة المرور خاطئة!");
      return; // ما يفتح الصفحة
    }
  }

  document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
  document.getElementById(page).classList.add('active');

  if(page === 'admin') loadRequests();
}

function submitForm() {
  let data = {
    name: document.getElementById('name').value,
    age: document.getElementById('age').value,
    exp: document.getElementById('exp').value,
    reason: document.getElementById('reason').value
  };

  let requests = JSON.parse(localStorage.getItem('طلبات') || '[]');
  requests.push(data);
  localStorage.setItem('طلبات', JSON.stringify(requests));

  alert('تم إرسال الطلب');
}

function loadRequests() {
  let container = document.getElementById('requests');
  container.innerHTML = '';

  let requests = JSON.parse(localStorage.getItem('طلبات') || '[]');

  requests.forEach(r => {
    let div = document.createElement('div');
    div.className = 'card';
    div.innerHTML = `
      <b>الاسم:</b> ${r.name}<br>
      <b>العمر:</b> ${r.age}<br>
      <b>الخبرة:</b> ${r.exp}<br>
      <b>السبب:</b> ${r.reason}
    `;
    container.appendChild(div);
  });
}

setInterval(loadRequests, 2000);
</script>

</body>
</html>
