<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LSPD | Police Academy</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Cairo',sans-serif;background:#020617;color:white}

header{padding:25px;text-align:center;font-size:30px;font-weight:bold;background:#020617;border-bottom:2px solid #1e40af}

nav{display:flex;justify-content:center;gap:15px;padding:15px}
nav button{padding:10px 15px;border:none;border-radius:6px;background:#020617;color:#cbd5f5;border:1px solid #1e40af;cursor:pointer;transition:.3s}
nav button:hover{background:#1e40af;color:#fff;box-shadow:0 0 10px #1e40af}

section{display:none;padding:30px}
.active{display:block;animation:fade .4s}
@keyframes fade{from{opacity:0}to{opacity:1}}

.container{max-width:900px;margin:auto;background:#020617;padding:25px;border-radius:10px;border:1px solid #1e40af}

input,textarea,select{width:100%;margin-top:10px;padding:12px;border-radius:6px;border:1px solid #1e40af;background:#020617;color:white}
input:focus,textarea:focus,select:focus{outline:none;box-shadow:0 0 10px #3b82f6}

.search-box{display:flex;gap:10px;margin-top:10px}
.search-box input{flex:2}
.search-box select{flex:1}

button.submit{margin-top:15px;padding:12px;width:100%;background:#1e40af;border:none;border-radius:6px;cursor:pointer}
button.submit:hover{background:#2563eb}

.card{padding:15px;margin-top:10px;border-radius:6px;background:#020617;border-left:5px solid #facc15}
.card.accepted{border-left-color:#16a34a;background:rgba(22,163,74,0.15)}
.card.rejected{border-left-color:#dc2626;background:rgba(220,38,38,0.15)}

.card button{margin-top:10px;margin-left:5px;padding:6px 12px;border:none;border-radius:5px;cursor:pointer}
.card .accept{background:#16a34a;color:white}
.card .reject{background:#dc2626;color:white}
.card .delete{background:#6b7280;color:white}

.status{font-weight:bold}
.pending{color:#facc15}
.acceptedText{color:#16a34a}
.rejectedText{color:#dc2626}

.alert{position:fixed;top:20px;right:20px;padding:10px 15px;border-radius:6px;font-weight:bold;animation:slide .4s}
.success{background:#16a34a}
.error{background:#dc2626}
@keyframes slide{from{transform:translateX(100%)}to{transform:translateX(0)}}
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

const firebaseConfig={apiKey:"AIzaSyAto5x8fpwvUmfnumsUekXLpyo3KGBsMt4",authDomain:"trust-police-academy.firebaseapp.com",databaseURL:"https://trust-police-academy-default-rtdb.firebaseio.com",projectId:"trust-police-academy"};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

let isAdmin=false;
let allRequests=[];

window.showPage=function(page){
 document.querySelectorAll('section').forEach(s=>s.classList.remove('active'));
 document.getElementById(page).classList.add('active');
 if(page==='admin'&&isAdmin)loadRequests();
}

function alertBox(msg,type){
 const div=document.createElement('div');
 div.className='alert '+type;
 div.innerText=msg;
 document.body.appendChild(div);
 setTimeout(()=>div.remove(),3000);
}

window.checkAdminPassword=function(){
 const pass=document.getElementById('adminPass').value;
 if(pass==='Police2026!'){isAdmin=true;alertBox('تم تسجيل الدخول','success');loadRequests();}
 else alertBox('كلمة المرور غلط','error');
}

window.submitForm=function(){
 const name=nameEl.value.trim();
 const age=ageEl.value.trim();
 const discordId=discordEl.value.trim();
 const exp=expEl.value.trim();
 const reason=reasonEl.value.trim();
 if(!name||!age||!discordId||!exp||!reason){alertBox('اكمل كل الحقول','error');return;}
 push(ref(db,'طلبات'),{name,age,discordId,exp,reason,status:'pending',time:Date.now()});
 alertBox('تم الإرسال','success');
}

window.acceptRequest=id=>update(ref(db,'طلبات/'+id),{status:'accepted'});
window.rejectRequest=id=>update(ref(db,'طلبات/'+id),{status:'rejected'});
window.deleteRequest=id=>{if(confirm('حذف الطلب؟')) remove(ref(db,'طلبات/'+id));}

function loadRequests(){
 onValue(ref(db,'طلبات'),snap=>{
  allRequests=[];
  snap.forEach(c=>allRequests.push({r:c.val(),key:c.key}));
  renderRequests();
 });
}

window.searchRequests=renderRequests;

function renderRequests(){
 const box=document.getElementById('requests');
 const search=document.getElementById('search').value.toLowerCase();
 const statusFilter=document.getElementById('filter').value;
 const sort=document.getElementById('sort').value;

 let data=[...allRequests];

 if(search) data=data.filter(x=>x.r.name.toLowerCase().includes(search));
 if(statusFilter!=='all') data=data.filter(x=>x.r.status===statusFilter);

 if(sort==='new') data.sort((a,b)=>b.r.time-a.r.time);
 if(sort==='old') data.sort((a,b)=>a.r.time-b.r.time);

 box.innerHTML='';

 data.forEach(({r,key})=>{
  const date=new Date(r.time);
  const formatted=date.toLocaleString('ar-SA');

  let statusClass='pending';
  let statusText='⏳ انتظار';
  if(r.status==='accepted'){statusClass='accepted';statusText='✅ مقبول';}
  if(r.status==='rejected'){statusClass='rejected';statusText='❌ مرفوض';}

  const div=document.createElement('div');
  div.className='card '+statusClass;
  div.innerHTML=`
  <b>${r.name}</b><br>
  العمر: ${r.age}<br>
  ID: ${r.discordId}<br>
  الخبرات: ${r.exp}<br>
  السبب: ${r.reason}<br>
  التاريخ: ${formatted}<br>
  <b class="${statusClass==='accepted'?'acceptedText':statusClass==='rejected'?'rejectedText':'pending'}">${statusText}</b><br>
  <button class="accept" onclick="acceptRequest('${key}')">قبول</button>
  <button class="reject" onclick="rejectRequest('${key}')">رفض</button>
  <button class="delete" onclick="deleteRequest('${key}')">حذف</button>`;

  box.appendChild(div);
 });
}
</script>
</head>
<body>

<header>LSPD | ACADEMY</header>

<nav>
<button onclick="showPage('home')">الرئيسية</button>
<button onclick="showPage('apply')">التقديم</button>
<button onclick="showPage('admin')">الإدارة</button>
</nav>

<section id="home" class="active"><div class="container"><h2>LSPD</h2></div></section>

<section id="apply"><div class="container">
<h2>التقديم</h2>
<input id="nameEl" placeholder="الاسم">
<input id="ageEl" placeholder="العمر">
<input id="discordEl" placeholder="Discord ID">
<textarea id="expEl" placeholder="الخبرات"></textarea>
<textarea id="reasonEl" placeholder="السبب"></textarea>
<button class="submit" onclick="submitForm()">إرسال</button>
</div></section>

<section id="admin"><div class="container">
<h2>لوحة الإدارة</h2>
<input type="password" id="adminPass" placeholder="كلمة المرور">
<button onclick="checkAdminPassword()">دخول</button>

<div class="search-box">
<input id="search" placeholder="بحث بالاسم" oninput="searchRequests()">
<select id="filter" onchange="searchRequests()">
<option value="all">كل الحالات</option>
<option value="pending">انتظار</option>
<option value="accepted">مقبول</option>
<option value="rejected">مرفوض</option>
</select>
<select id="sort" onchange="searchRequests()">
<option value="new">الأحدث</option>
<option value="old">الأقدم</option>
</select>
</div>

<div id="requests"></div>
</div></section>

</body>
</html>
