<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LSPD | Police Academy</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin:0; padding:0; }
body {
  font-family: 'Cairo', sans-serif;
  background: radial-gradient(circle at top,#020617,#000000);
  color: white;
}

/* Header LSPD */
header {
  padding: 25px;
  text-align: center;
  font-size: 32px;
  font-weight: bold;
  background: linear-gradient(90deg,#0f172a,#1e293b);
  border-bottom: 2px solid #1d4ed8;
  letter-spacing:2px;
}

/* Navbar */
nav { display:flex; justify-content:center; gap:15px; padding:15px; }
nav button {
  padding:10px 18px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  background:#020617;
  color:#cbd5f5;
  border:1px solid #1e40af;
  transition:0.3s;
}
nav button:hover {
  background:#1e40af;
  color:white;
  box-shadow:0 0 10px #1e40af;
}

section { display:none; padding:30px; }
.active { display:block; animation:fadeIn .4s ease; }

@keyframes fadeIn {
  from {opacity:0; transform:translateY(10px);} 
  to {opacity:1; transform:translateY(0);} 
}

.container {
  max-width:800px;
  margin:auto;
  background:rgba(2,6,23,0.9);
  padding:30px;
  border-radius:10px;
  border:1px solid #1e40af;
  box-shadow:0 0 25px rgba(30,64,175,0.3);
}

/* Inputs LSPD */
input, textarea {
  width:100%;
  margin-top:12px;
  padding:14px;
  border-radius:6px;
  border:1px solid #1e40af;
  background:#020617;
  color:white;
  transition:0.2s;
}

input:focus, textarea:focus {
  outline:none;
  border-color:#3b82f6;
  box-shadow:0 0 10px #3b82f6;
}

/* زر */
button.submit {
  margin-top:20px;
  padding:14px;
  width:100%;
  background:#1e40af;
  border:none;
  border-radius:6px;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}
button.submit:hover {
  background:#2563eb;
  box-shadow:0 0 15px #2563eb;
}

/* Cards */
.card {
  margin-top:15px;
  padding:15px;
  border-radius:8px;
  border-left:5px solid #1e40af;
  background:#020617;
}

/* Alerts */
.alert {
  position:fixed;
  top:20px;
  right:20px;
  padding:12px 18px;
  border-radius:6px;
  font-weight:bold;
  animation:slide .4s ease;
}
.success { background:#16a34a; }
.error { background:#dc2626; }

@keyframes slide {
  from {transform:translateX(100%);} 
  to {transform:translateX(0);} 
}

</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAto5x8fpwvUmfnumsUekXLpyo3KGBsMt4",
  authDomain: "trust-police-academy.firebaseapp.com",
  databaseURL: "https://trust-police-academy-default-rtdb.firebaseio.com",
  projectId: "trust-police-academy",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.showPage = function(page) {
  document.querySelectorAll('section').forEach(s=>s.classList.remove('active'));
  document.getElementById(page).classList.add('active');
}

function alertBox(msg,type) {
  const div=document.createElement('div');
  div.className='alert '+type;
  div.innerText=msg;
  document.body.appendChild(div);
  setTimeout(()=>div.remove(),3000);
}

window.submitForm = function() {
  const name=document.getElementById('name').value.trim();
  const age=document.getElementById('age').value.trim();
  const discordId=document.getElementById('discordId').value.trim();
  const exp=document.getElementById('exp').value.trim();
  const reason=document.getElementById('reason').value.trim();

  if(!name||!age||!discordId||!exp||!reason){
    alertBox('اكمل جميع الحقول','error');
    return;
  }

  push(ref(db,'طلبات'),{name,age,discordId,exp,reason,status:'pending'});
  alertBox('تم ارسال الطلب','success');
}
</script>
</head>
<body>

<header>LSPD | POLICE ACADEMY</header>

<nav>
  <button onclick="showPage('home')">الرئيسية</button>
  <button onclick="showPage('apply')">التقديم</button>
</nav>

<section id="home" class="active">
  <div class="container">
    <h2>Los Santos Police Department</h2>
    <p>نظام التقديم الرسمي للأكاديمية</p>
  </div>
</section>

<section id="apply">
  <div class="container">
    <h2>طلب الانضمام</h2>
    <input id="name" placeholder="الاسم الكامل">
    <input id="age" type="number" placeholder="العمر">
    <input id="discordId" placeholder="Discord ID">
    <textarea id="exp" placeholder="الخبرات"></textarea>
    <textarea id="reason" placeholder="سبب التقديم"></textarea>
    <button class="submit" onclick="submitForm()">إرسال الطلب</button>
  </div>
</section>

</body>
</html>
