<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trust State | Academy</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Cairo',sans-serif;background:#0a0d12;color:white}

/* 🔥 الصورة الجديدة فوق */
.main-image{
  width:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  margin-bottom:10px;
  animation:fadeIn 1.5s ease;
}

.main-image img{
  width:90%;
  max-height:220px;
  object-fit:cover;
  border-radius:10px;
  transition:0.3s;
}

.main-image img:hover{
  transform:scale(1.02);
  box-shadow:0 0 30px rgba(255,255,255,0.4);
}

/* حركة دخول */
@keyframes fadeIn{
  from{opacity:0;transform:translateY(-30px);}
  to{opacity:1;transform:translateY(0);}
}

/* 🔥 بنر القديم */
.top-banner{
  background:url('https://files.fm/u/kwmh93txcb');
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  height:200px;
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  padding:30px 50px;
  border-bottom:1px solid #1f2937;
  position:relative;
}

.top-banner::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to bottom, rgba(0,0,0,0.4), rgba(0,0,0,0.8));
}

.banner-text h1{
  font-size:26px;
  font-weight:700;
  color:#e5e7eb;
}

.banner-text span{
  font-size:13px;
  color:#9ca3af;
}

.logo{
  width:60px;
  height:60px;
  border-radius:50%;
  border:2px solid rgba(255,255,255,0.2);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  color:#e5e7eb;
  font-size:18px;
  backdrop-filter:blur(5px);
}

nav{
  display:flex;
  justify-content:center;
  gap:15px;
  padding:15px;
  background:#0f141b;
  border-bottom:1px solid #1f2937;
}

nav button{
  padding:10px 15px;
  background:#111827;
  border:1px solid #1f2937;
  color:#d1d5db;
  border-radius:6px;
  cursor:pointer;
  transition:.3s;
}

nav button:hover{
  background:#1f2937;
  color:white;
}

section{display:none;padding:30px}
.active{display:block}

.container{
  max-width:900px;
  margin:auto;
  background:#0f141b;
  padding:25px;
  border-radius:10px;
  border:1px solid #1f2937;
}

input,textarea,select{
  width:100%;
  margin-top:10px;
  padding:12px;
  border-radius:6px;
  border:1px solid #1f2937;
  background:#020617;
  color:white;
}

button.submit{
  margin-top:15px;
  padding:12px;
  width:100%;
  background:#1e40af;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.card{
  padding:15px;
  margin-top:10px;
  border-radius:6px;
  background:#020617;
  border-left:5px solid #facc15;
}
.card.accepted{border-left-color:#22c55e}
.card.rejected{border-left-color:#ef4444}

.card button{margin-top:10px;margin-left:5px;padding:6px 12px;border:none;border-radius:5px;cursor:pointer}
.accept{background:#22c55e}
.reject{background:#ef4444}
.delete{background:#6b7280}

.search-box{display:flex;gap:10px;margin-top:10px}

.alert{position:fixed;top:20px;right:20px;padding:10px;border-radius:6px}
.success{background:#22c55e}
.error{background:#ef4444}
</style>
</head>

<body>

<!-- 🔥 الصورة الجديدة -->
<div class="main-image">
  <img src="https://i.imgur.com/1d6sksS.png" alt="TS Banner">
</div>

<!-- 🔥 البانر القديم -->
<div class="top-banner">
  <div class="banner-text">
    <h1>Trust State | Ministry of Interior - Academy</h1>
    <span>Official Police System</span>
  </div>
  <div class="logo">
    <img src="a_digital_logo_logo_design_for_a_police_academy.png" style="width:60px;height:60px;border-radius:50%;object-fit:cover;" />
  </div>
</div>

<nav>
<button onclick="showPage('home')">الرئيسية</button>
<button onclick="showPage('apply')">التقديم</button>
<button onclick="showPage('admin')">الإدارة</button>
</nav>

<section id="home" class="active"><div class="container">مرحبا بك</div></section>

<section id="apply"><div class="container">
<select id="status" disabled>
<option>⏳ انتظار</option>
<option>✅ مقبول</option>
<option>❌ مرفوض</option>
</select>
<input id="nameEl" placeholder="الاسم">
<input id="ageEl" placeholder="العمر">
<input id="discordEl" placeholder="Discord ID">
<textarea id="expEl" placeholder="الخبرات"></textarea>
<textarea id="reasonEl" placeholder="السبب"></textarea>
<button class="submit" onclick="submitForm()">إرسال</button>
</div></section>

<section id="admin"><div class="container">
<input id="adminPass" placeholder="كلمة المرور">
<button onclick="checkAdminPassword()">دخول</button>
<div class="search-box">
<input id="search" placeholder="بحث بالاسم" oninput="searchRequests()">
</div>
<div id="requests"></div>
</div></section>

</body>
</html>
