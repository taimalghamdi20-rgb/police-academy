<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trust State | Academy</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Cairo',sans-serif;background:#0a0d12;color:white}

/* البنر */
.main-banner{
  width:100%;
  height:260px;
  background:url('https://i.imgur.com/hkqECfm.png') center/cover no-repeat;
  position:relative;
}

.main-banner::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(0,0,0,0.8));
}

/* الهيدر */
.top-banner{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 40px;
  background:#0f141b;
  border-bottom:1px solid #1f2937;
}

.banner-text h1{font-size:22px}
.banner-text span{font-size:12px;color:#9ca3af}

/* اللوقو */
.logo{
  width:60px;height:60px;border-radius:50%;
  border:2px solid rgba(255,255,255,0.2);
  overflow:hidden;
}
.logo img{width:100%;height:100%;object-fit:cover}

/* الناف */
nav{
  display:flex;
  justify-content:center;
  gap:15px;
  padding:15px;
  background:#0f141b;
}

nav button{
  padding:10px;
  background:#111827;
  border:1px solid #1f2937;
  color:#d1d5db;
  border-radius:6px;
  cursor:pointer;
}

/* باقي التصميم */
section{display:none;padding:30px}
.active{display:block}

.container{
  max-width:900px;
  margin:auto;
  background:#0f141b;
  padding:25px;
  border-radius:10px;
}

input,textarea,select{
  width:100%;
  margin-top:10px;
  padding:12px;
  background:#020617;
  color:white;
  border:1px solid #1f2937;
}

button.submit{
  margin-top:15px;
  padding:12px;
  width:100%;
  background:#1e40af;
  border:none;
}

.card{
  padding:15px;
  margin-top:10px;
  border-radius:6px;
  background:#020617;
  border-left:5px solid #facc15;
}
.card.accepted{border-left-color:#22c55e}
.card.rejected{border-left-color:#ef4444}

.card button{margin-top:10px;margin-left:5px}
.accept{background:#22c55e}
.reject{background:#ef4444}
.delete{background:#6b7280}

.alert{position:fixed;top:20px;right:20px;padding:10px;border-radius:6px}
.success{background:#22c55e}
.error{background:#ef4444}
</style>
</head>

<body>

<div class="main-banner"></div>

<div class="top-banner">
  <div class="banner-text">
    <h1>Trust State | Ministry of Interior - Academy</h1>
    <span>Official Police System</span>
  </div>

  <div class="logo">
    <img src="PUT-LOGO-HERE">
  </div>
</div>

<nav>
<button onclick="showPage('home')">الرئيسية</button>
<button onclick="showPage('apply')">التقديم</button>
<button onclick="showPage('admin')">الإدارة</button>
</nav>

<section id="home" class="active">
<div class="container">مرحبا بك في أكاديمية شرطة Trust State</div>
</section>

<section id="apply">
<div class="container">
<select id="status" disabled>
<option>⏳ انتظار</option>
<option>✅ مقبول</option>
<option>❌ مرفوض</option>
</select>
<input id="nameEl" placeholder="الاسم">
<input id="ageEl" placeholder="العمر">
<input id="discordEl" placeholder="Discord ID">
<textarea id="expEl" placeholder="الخبرات"></textarea>
<textarea id="reasonEl" placeholder="السبب"></textarea>
<button class="submit" onclick="submitForm()">إرسال</button>
</div>
</section>

<section id="admin">
<div class="container">
<input id="adminPass" placeholder="كلمة المرور" type="password">
<button onclick="checkAdminPassword()">دخول</button>

<div class="search-box">
<input id="search" placeholder="بحث بالاسم" oninput="searchRequests()">
</div>

<div id="requests"></div>
</div>
</section>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, push, get, update, remove } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

const firebaseConfig={
 apiKey:"AIzaSyAto5x8fpwvUmfnumsUekXLpyo3KGBsMt4",
 authDomain:"trust-police-academy.firebaseapp.com",
 databaseURL:"https://trust-police-academy-default-rtdb.firebaseio.com",
 projectId:"trust-police-academy"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

let isAdmin=false;
let allRequests=[];

/* تنقل */
window.showPage=function(p){
 document.querySelectorAll('section').forEach(s=>s.classList.remove('active'));
 document.getElementById(p).classList.add('active');
 if(p==='admin'&&isAdmin) loadRequests();
}

/* تنبيه */
function alertBox(m,t){
 const d=document.createElement('div');
 d.className='alert '+t;
 d.innerText=m;
 document.body.appendChild(d);
 setTimeout(()=>d.remove(),3000);
}

/* ادمن */
window.checkAdminPassword=function(){
 const p=document.getElementById('adminPass').value;
 if(p==='Police2026!'){
   isAdmin=true;
   alertBox('تم الدخول','success');
   loadRequests();
 } else alertBox('خطأ','error');
}

/* إرسال مع انتظار 3 دقائق */
window.submitForm=function(){
 const now=Date.now();
 const last=localStorage.getItem('lastSubmit');

 if(last && now - last < 180000){
   const sec=Math.ceil((180000-(now-last))/1000);
   alertBox('انتظر '+sec+' ثانية قبل التقديم مرة ثانية','error');
   return;
 }

 const name=nameEl.value.trim();
 const age=ageEl.value.trim();
 const discordId=discordEl.value.trim();
 const exp=expEl.value.trim();
 const reason=reasonEl.value.trim();

 if(!name||!age||!discordId||!exp||!reason){
   alertBox('اكمل الحقول','error');
   return;
 }

 push(ref(db,'طلبات'),{
   name, age, discordId, exp, reason,
   status:'pending',
   time:Date.now()
 }).then(()=>{
   localStorage.setItem('lastSubmit',Date.now());
   alertBox('تم الإرسال','success');
   // مسح الحقول بعد الإرسال
   nameEl.value=''; ageEl.value=''; discordEl.value=''; expEl.value=''; reasonEl.value='';
 });
}

/* تحميل الطلبات */
function loadRequests(){
 get(ref(db,'طلبات')).then(snap=>{
   allRequests=[];
   snap.forEach(c => allRequests.push({r:c.val(), key:c.key}));
   renderRequests();
 });
}

window.searchRequests=renderRequests;

function renderRequests(){
 const box=document.getElementById('requests');
 const search=document.getElementById('search').value.toLowerCase();
 box.innerHTML='';

 allRequests.forEach(({r,key})=>{
  if(search && !r.name.toLowerCase().includes(search)) return;

  const date=new Date(r.time).toLocaleString('ar-SA');
  let cls='pending',txt='⏳ انتظار';
  if(r.status==='accepted'){cls='accepted';txt='✅ مقبول'}
  if(r.status==='rejected'){cls='rejected';txt='❌ مرفوض'}

  const div=document.createElement('div');
  div.className='card '+cls;
  div.innerHTML=`
  <b>الاسم:</b> ${r.name}<br>
  <b>العمر:</b> ${r.age}<br>
  <b>ID:</b> ${r.discordId}<br>
  <b>الخبرات:</b> ${r.exp}<br>
  <b>السبب:</b> ${r.reason}<br>
  <b>التاريخ:</b> ${date}<br>
  <b>${txt}</b><br>
  <button class='accept' onclick="acceptRequest('${key}')">قبول</button>
  <button class='reject' onclick="rejectRequest('${key}')">رفض</button>
  <button class='delete' onclick="deleteRequest('${key}')">حذف</button>`;
  box.appendChild(div);
 });
}

window.acceptRequest=id=>update(ref(db,'طلبات/'+id),{status:'accepted'});
window.rejectRequest=id=>update(ref(db,'طلبات/'+id),{status:'rejected'});
window.deleteRequest=id=>remove(ref(db,'طلبات/'+id));
</script>

</body>
</html>
