<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trust | Police Academy</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Cairo', Arial, sans-serif;
      background: linear-gradient(135deg, #020617, #0f172a);
      color: white;
    }

    header {
      text-align: center;
      padding: 30px;
      font-size: 32px;
      font-weight: bold;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .container {
      max-width: 700px;
      margin: 40px auto;
      background: rgba(255,255,255,0.05);
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 0 30px rgba(0,0,0,0.6);
      backdrop-filter: blur(15px);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-top: 15px;
      font-size: 14px;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      margin-top: 5px;
      border-radius: 10px;
      border: none;
      outline: none;
      background: rgba(255,255,255,0.1);
      color: white;
    }

    input::placeholder, textarea::placeholder {
      color: #ccc;
    }

    button {
      margin-top: 25px;
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      border: none;
      border-radius: 12px;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.03);
      opacity: 0.9;
    }

    .success {
      display: none;
      text-align: center;
      margin-top: 20px;
      color: #22c55e;
      font-weight: bold;
    }
  </style>
</head>
<body>

<header>Trust | Police Academy</header>

<div class="container">
  <h2>نموذج التقديم العسكري</h2>

  <form onsubmit="submitForm(event)">
    <label>الاسم الكامل</label>
    <input type="text" placeholder="اكتب اسمك هنا" required>

    <label>العمر</label>
    <input type="number" placeholder="مثال: 18" required>

    <label>الرتبة المطلوبة</label>
    <select>
      <option>Cadet</option>
      <option>Officer</option>
      <option>Sergeant</option>
    </select>

    <label>الخبرات</label>
    <textarea rows="3" placeholder="اكتب خبراتك"></textarea>

    <label>سبب التقديم</label>
    <textarea rows="3" placeholder="ليش تبغى تنضم؟"></textarea>

    <button type="submit">إرسال الطلب</button>
  </form>

  <div class="success" id="msg">✅ تم إرسال طلبك بنجاح</div>
</div>

<script>
function submitForm(e) {
  e.preventDefault();
  document.getElementById('msg').style.display = 'block';
}
</script>

</body>
</html>
